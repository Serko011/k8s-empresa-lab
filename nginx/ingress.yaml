apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-gitops
spec:
  ingressClassName: nginx
  rules:
  - host: gitops.empresa.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-gitops
            port:
              number: 80
