apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>GitOps Lab</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #0f172a;
          color: white;
          text-align: center;
          padding-top: 80px;
        }

        h1 {
          color: #38bdf8;
          font-size: 48px;
        }

        .box {
          background: #1e293b;
          width: 600px;
          margin: auto;
          padding: 30px;
          border-radius: 10px;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tech {
          margin-top: 20px;
        }

        .tech span {
          background: #334155;
          padding: 8px 14px;
          border-radius: 6px;
          margin: 5px;
          display: inline-block;
        }
      </style>
    </head>

    <body>

      <div class="box">
        <h1>GitOps Kubernetes Lab</h1>

        <p>This application is deployed using a GitOps workflow.</p>

        <div class="tech">
          <span>Kubernetes</span>
          <span>ArgoCD</span>
          <span>GitHub</span>
          <span>Ingress NGINX</span>
          <span>DNS</span>
        </div>

        <p style="margin-top:30px;">
        Changes pushed to GitHub are automatically deployed by ArgoCD.
        </p>

        <p style="margin-top:20px; font-size:14px; color: #94a3b8;">
        DevOps GitOps Demonstration Lab
        </p>

      </div>

    </body>
    </html>
